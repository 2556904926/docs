<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一阶系统 · 可调时间常数 · 实时响应</title>
    <!-- Chart.js 轻量绘图 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
            padding: 28px 24px 32px;
            transition: box-shadow 0.2s;
        }
        h1 {
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            margin: 0 0 6px 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sub {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: -4px;
            margin-bottom: 24px;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            background: #f8fafc;
            border-radius: 0 12px 12px 0;
            line-height: 1.5;
        }
        .sub code {
            background: #e2e8f0;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #0f172a;
        }
        .control-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 24px 40px;
            border: 1px solid #e9edf2;
        }
        .slider-group {
            flex: 2;
            min-width: 200px;
        }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            color: #1e293b;
            font-size: 0.95rem;
            letter-spacing: 0.2px;
            margin-bottom: 6px;
        }
        .slider-group label span:first-child {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .slider-group label span:last-child {
            background: #1e293b;
            color: white;
            padding: 0 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            line-height: 28px;
            min-width: 56px;
            text-align: center;
        }
        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #d1d9e6;
            border-radius: 12px;
            outline: none;
            transition: background 0.2s;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(59,130,246,0.3);
            transition: 0.1s;
            border: 2px solid white;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.12);
            background: #2563eb;
        }
        input[type=range]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(59,130,246,0.3);
        }
        .info-badge {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 16px 28px;
            background: white;
            padding: 8px 16px 8px 20px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
        }
        .info-badge div {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 0.95rem;
            color: #1e293b;
        }
        .info-badge div strong {
            font-weight: 600;
            color: #0f172a;
        }
        .info-badge .value {
            background: #eef2f6;
            padding: 0 12px;
            border-radius: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }
        .chart-wrapper {
            position: relative;
            height: 320px;
            margin-top: 8px;
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 8px 8px 8px;
            border: 1px solid #edf2f7;
        }
        .footer-note {
            margin-top: 18px;
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            border-top: 1px dashed #dce2ec;
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .footer-note span {
            background: #f1f4f9;
            padding: 0 14px;
            border-radius: 30px;
            line-height: 28px;
        }
        @media (max-width: 500px) {
            .card { padding: 18px; }
            .control-panel { flex-direction: column; align-items: stretch; gap: 16px; }
            .info-badge { border-radius: 30px; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>⚡ 一阶系统</span>
        <span style="font-size: 1rem; font-weight: 400; color: #475569; margin-left: auto;">时域响应 · 实时</span>
    </h1>
    <div class="sub">
        <code>G(s) = 1 / (τ·s + 1)</code> &nbsp; 单位阶跃输入 &nbsp; · &nbsp; 拖动滑块调节时间常数 <strong>τ</strong>
    </div>

    <!-- 控制栏 -->
    <div class="control-panel">
        <div class="slider-group">
            <label>
                <span>⏱️ 时间常数 τ</span>
                <span id="tauDisplay">0.50</span>
            </label>
            <input type="range" id="tauSlider" min="0.10" max="3.00" step="0.01" value="0.50">
        </div>
        <div class="info-badge">
            <div><strong>上升时间 (10→90%)</strong> <span class="value" id="riseTime">1.10</span><span style="font-size:0.75rem; color:#64748b;">s</span></div>
            <div><strong>稳态值</strong> <span class="value">1.00</span></div>
        </div>
    </div>

    <!-- 图表容器 -->
    <div class="chart-wrapper">
        <canvas id="stepResponseChart"></canvas>
    </div>
    <div class="footer-note">
        <span>📈 响应曲线 <span style="color:#3b82f6;">y(t) = 1 − e<sup>−t/τ</sup></span></span>
        <span>🔄 滑动即更新 · 嵌入 MD 友好</span>
    </div>
</div>

<script>
    (function() {
        // --- DOM 元素 ---
        const canvas = document.getElementById('stepResponseChart');
        const tauSlider = document.getElementById('tauSlider');
        const tauDisplay = document.getElementById('tauDisplay');
        const riseTimeEl = document.getElementById('riseTime');

        // --- 固定参数 ---
        const MAX_TIME = 10.0;          
        const POINTS = 180;            // 平滑曲线

        // --- 创建 Chart 实例 ---
        let chart = null;

        // 初始化图表
        function initChart() {
            const ctx = canvas.getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],   // 时间轴
                    datasets: [{
                        label: '单位阶跃响应 y(t)',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.06)',
                        borderWidth: 3,
                        pointRadius: 0,
                        tension: 0.2,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 80,        // 微动效，更跟手
                        easing: 'linear'
                    },
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                boxWidth: 12,
                                boxHeight: 12,
                                color: '#1e293b',
                                font: { size: 13, weight: '500' }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    let val = context.parsed.y;
                                    return label + ': ' + val.toFixed(3);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            min: 0,
                            max: MAX_TIME,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            title: {
                                display: true,
                                text: '时间 (秒)',
                                color: '#475569',
                                font: { size: 12, weight: '500' }
                            },
                            ticks: {
                                stepSize: 1.0,
                                color: '#64748b',
                                callback: function(value) { return value.toFixed(1); }
                            }
                        },
                        y: {
                            min: 0,
                            max: 1.25,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            title: {
                                display: true,
                                text: '幅度',
                                color: '#475569',
                                font: { size: 12, weight: '500' }
                            },
                            ticks: {
                                stepSize: 0.25,
                                color: '#64748b',
                                callback: function(value) { return value.toFixed(2); }
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    }
                }
            });
        }

        // --- 计算一阶系统阶跃响应 (y = 1 - exp(-t/τ)) ---
        function computeResponse(tau) {
            const t = [];
            const y = [];
            const step = MAX_TIME / (POINTS - 1);
            for (let i = 0; i < POINTS; i++) {
                const time = i * step;
                t.push(time);
                // 一阶系统单位阶跃响应:  y(t) = 1 - e^(-t/τ)
                let value = 1 - Math.exp(-time / tau);
                // 数值保护
                if (value < 0) value = 0;
                if (value > 1.0) value = 1.0;
                y.push(value);
            }
            return { t, y };
        }

        // --- 计算上升时间 (10% ~ 90%) ---
        function computeRiseTime(tau) {
            if (tau <= 0) return 0;
            // 理论: t10 = -τ * ln(0.9) , t90 = -τ * ln(0.1) , 上升时间 = t90 - t10
            const t10 = -tau * Math.log(0.9);
            const t90 = -tau * Math.log(0.1);
            const rise = t90 - t10;
            return rise > 0 ? rise : 0;
        }

        // --- 更新图表 + 信息 ---
        function updateChart() {
            const tau = parseFloat(tauSlider.value);
            // 更新显示
            tauDisplay.textContent = tau.toFixed(2);

            // 计算上升时间
            const rise = computeRiseTime(tau);
            riseTimeEl.textContent = rise.toFixed(2);

            // 计算响应数据
            const { t, y } = computeResponse(tau);

            // 更新 chart 数据
            if (chart) {
                chart.data.labels = t;
                chart.data.datasets[0].data = y;
                chart.update('none');  // 无动画，但保留过渡
            }
        }

        // --- 滑块事件绑定 ---
        function handleSliderChange() {
            updateChart();
        }

        // --- 初始化 ---
        function init() {
            initChart();
            // 设置初始值 (与 slider 默认值一致)
            tauSlider.value = '0.50';
            updateChart();

            // 监听滑块
            tauSlider.addEventListener('input', handleSliderChange);
            // 窗口尺寸变化时，图表自适应 (chart.js 自带的 responsive 已经处理)
        }

        // 启动
        init();
    })();
</script>

</body>
</html>
