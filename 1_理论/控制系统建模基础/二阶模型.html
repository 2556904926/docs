<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二阶系统 · 可调阻尼比 & 自然频率 · 实时响应</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            max-width: 960px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
            padding: 28px 24px 32px;
        }
        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sub {
            color: #475569;
            font-size: 0.95rem;
            margin-top: -2px;
            margin-bottom: 22px;
            padding-left: 16px;
            border-left: 4px solid #8b5cf6;
            background: #f8fafc;
            border-radius: 0 12px 12px 0;
            line-height: 1.6;
            padding: 8px 16px;
        }
        .sub code {
            background: #e2e8f0;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #0f172a;
        }
        .control-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px 24px 24px;
            margin-bottom: 24px;
            border: 1px solid #e9edf2;
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 40px;
        }
        .slider-group {
            flex: 1;
            min-width: 180px;
        }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            color: #1e293b;
            font-size: 0.92rem;
            margin-bottom: 4px;
        }
        .slider-group label span:last-child {
            background: #1e293b;
            color: white;
            padding: 0 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            line-height: 26px;
            min-width: 48px;
            text-align: center;
        }
        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #d1d9e6;
            border-radius: 12px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #8b5cf6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(139,92,246,0.3);
            border: 2px solid white;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.12);
            background: #7c3aed;
        }
        input[type=range]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #8b5cf6;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(139,92,246,0.3);
        }
        .info-badge {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 28px;
            background: white;
            padding: 8px 18px 8px 22px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            margin-top: 16px;
        }
        .info-badge div {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 0.92rem;
            color: #1e293b;
        }
        .info-badge .value {
            background: #eef2f6;
            padding: 0 12px;
            border-radius: 24px;
            font-weight: 600;
            font-family: monospace;
        }
        .chart-wrapper {
            position: relative;
            height: 320px;
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 8px 8px 8px;
            border: 1px solid #edf2f7;
        }
        .footer-note {
            margin-top: 18px;
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            border-top: 1px dashed #dce2ec;
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer-note span {
            background: #f1f4f9;
            padding: 0 14px;
            border-radius: 30px;
            line-height: 28px;
        }
        @media (max-width: 600px) {
            .card { padding: 16px; }
            .control-row { flex-direction: column; gap: 12px; }
            .info-badge { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        <span>🎯 二阶系统</span>
        <span style="font-size: 1rem; font-weight: 400; color: #475569; margin-left: auto;">单位阶跃响应 · 实时</span>
    </h1>
    <div class="sub">
        <code>G(s) = ωₙ² / (s² + 2ζωₙ·s + ωₙ²)</code> &nbsp; 调节阻尼比 <strong>ζ</strong> 与自然频率 <strong>ωₙ</strong>
    </div>

    <div class="control-panel">
        <div class="control-row">
            <div class="slider-group">
                <label>
                    <span>阻尼比 ζ</span>
                    <span id="zetaDisplay">0.50</span>
                </label>
                <input type="range" id="zetaSlider" min="0.05" max="2.00" step="0.01" value="0.50">
            </div>
            <div class="slider-group">
                <label>
                    <span>自然频率 ωₙ (rad/s)</span>
                    <span id="wnDisplay">1.00</span>
                </label>
                <input type="range" id="wnSlider" min="0.30" max="3.00" step="0.05" value="1.00">
            </div>
        </div>
        <div class="info-badge">
            <div><strong>超调量</strong> <span class="value" id="overshoot">16.3%</span></div>
            <div><strong>峰值时间</strong> <span class="value" id="peakTime">3.63</span><span style="font-size:0.75rem;">s</span></div>
            <div><strong>调节时间 (2%)</strong> <span class="value" id="settlingTime">4.00</span><span style="font-size:0.75rem;">s</span></div>
            <div><strong>稳态值</strong> <span class="value">1.00</span></div>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="stepResponseChart"></canvas>
    </div>
    <div class="footer-note">
        <span>📈 响应曲线 y(t)</span>
        <span>🔄 滑动即更新</span>
        <span style="color:#8b5cf6;">▼ 欠阻尼 ζ&lt;1</span>
        <span style="color:#3b82f6;">— 临界阻尼 ζ=1</span>
        <span style="color:#10b981;">— 过阻尼 ζ&gt;1</span>
    </div>
</div>

<script>
    (function() {
        // DOM
        const canvas = document.getElementById('stepResponseChart');
        const zetaSlider = document.getElementById('zetaSlider');
        const wnSlider = document.getElementById('wnSlider');
        const zetaDisplay = document.getElementById('zetaDisplay');
        const wnDisplay = document.getElementById('wnDisplay');
        const overshootEl = document.getElementById('overshoot');
        const peakTimeEl = document.getElementById('peakTime');
        const settlingTimeEl = document.getElementById('settlingTime');

        const MAX_TIME = 10.0;
        const POINTS = 300;

        let chart = null;

        // --- 二阶系统阶跃响应 (解析解) ---
        function computeSecondOrderResponse(zeta, wn) {
            const t = [];
            const y = [];
            const dt = MAX_TIME / (POINTS - 1);

            // 判断阻尼情况
            const isUnderdamped = zeta < 1;
            const isCriticallyDamped = Math.abs(zeta - 1) < 1e-9;
            const isOverdamped = zeta > 1;

            for (let i = 0; i < POINTS; i++) {
                const time = i * dt;
                t.push(time);
                let value = 0;

                if (isUnderdamped) {
                    // 欠阻尼: y(t) = 1 - e^(-ζωₙt) / sqrt(1-ζ²) * sin(ω_d*t + φ)
                    const wd = wn * Math.sqrt(1 - zeta * zeta);
                    const phi = Math.atan2(Math.sqrt(1 - zeta * zeta), zeta);
                    const expTerm = Math.exp(-zeta * wn * time);
                    value = 1 - (expTerm / Math.sqrt(1 - zeta * zeta)) * Math.sin(wd * time + phi);
                } else if (isCriticallyDamped) {
                    // 临界阻尼: y(t) = 1 - e^(-wn*t) * (1 + wn*t)
                    const expTerm = Math.exp(-wn * time);
                    value = 1 - expTerm * (1 + wn * time);
                } else {
                    // 过阻尼: y(t) = 1 - e^(-ζωₙt) * [ cosh(ω_d*t) + (ζ/√(ζ²-1)) * sinh(ω_d*t) ]
                    const wd = wn * Math.sqrt(zeta * zeta - 1);
                    const expTerm = Math.exp(-zeta * wn * time);
                    const coshTerm = Math.cosh(wd * time);
                    const sinhTerm = Math.sinh(wd * time);
                    value = 1 - expTerm * (coshTerm + (zeta / Math.sqrt(zeta * zeta - 1)) * sinhTerm);
                }

                // 数值保护
                if (value < -0.05) value = -0.05;
                if (value > 1.3) value = 1.3;
                y.push(value);
            }
            return { t, y };
        }

        // --- 计算性能指标 ---
        function computeMetrics(zeta, wn) {
            let overshoot = 0;
            let peakTime = 0;
            let settlingTime = 0;

            if (zeta < 1) {
                // 欠阻尼
                overshoot = 100 * Math.exp(-zeta * Math.PI / Math.sqrt(1 - zeta * zeta));
                const wd = wn * Math.sqrt(1 - zeta * zeta);
                peakTime = Math.PI / wd;
                settlingTime = 4 / (zeta * wn);
            } else if (Math.abs(zeta - 1) < 1e-9) {
                // 临界阻尼
                overshoot = 0;
                peakTime = 0;
                settlingTime = 4 / wn;
            } else {
                // 过阻尼
                overshoot = 0;
                peakTime = 0;
                // 近似调节时间
                const lambda1 = wn * (zeta - Math.sqrt(zeta * zeta - 1));
                const lambda2 = wn * (zeta + Math.sqrt(zeta * zeta - 1));
                const tau = 1 / lambda1;
                settlingTime = 4 * tau;
            }

            // 边界保护
            if (overshoot < 0) overshoot = 0;
            if (overshoot > 100) overshoot = 100;
            if (peakTime < 0) peakTime = 0;
            if (settlingTime < 0) settlingTime = 0;

            return { overshoot, peakTime, settlingTime };
        }

        // --- 更新图表 ---
        function updateChart() {
            const zeta = parseFloat(zetaSlider.value);
            const wn = parseFloat(wnSlider.value);

            zetaDisplay.textContent = zeta.toFixed(2);
            wnDisplay.textContent = wn.toFixed(2);

            const metrics = computeMetrics(zeta, wn);
            overshootEl.textContent = metrics.overshoot.toFixed(1) + '%';
            peakTimeEl.textContent = metrics.peakTime.toFixed(2);
            settlingTimeEl.textContent = metrics.settlingTime.toFixed(2);

            const { t, y } = computeSecondOrderResponse(zeta, wn);

            if (chart) {
                chart.data.labels = t;
                chart.data.datasets[0].data = y;
                chart.update('none');
            }
        }

        // --- 初始化Chart.js ---
        function initChart() {
            const ctx = canvas.getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '单位阶跃响应 y(t)',
                        data: [],
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.06)',
                        borderWidth: 3,
                        pointRadius: 0,
                        tension: 0.15,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 80, easing: 'linear' },
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                boxWidth: 14,
                                boxHeight: 14,
                                color: '#1e293b',
                                font: { size: 13, weight: '500' }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return 'y(t) = ' + context.parsed.y.toFixed(4);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            min: 0,
                            max: MAX_TIME,
                            grid: { color: 'rgba(0,0,0,0.04)' },
                            title: {
                                display: true,
                                text: '时间 (秒)',
                                color: '#475569',
                                font: { size: 12, weight: '500' }
                            },
                            ticks: { stepSize: 1.0, color: '#64748b' }
                        },
                        y: {
                            min: -0.1,
                            max: 1.35,
                            grid: { color: 'rgba(0,0,0,0.04)' },
                            title: {
                                display: true,
                                text: '幅度',
                                color: '#475569',
                                font: { size: 12, weight: '500' }
                            },
                            ticks: { stepSize: 0.25, color: '#64748b' }
                        }
                    },
                    interaction: { intersect: false, mode: 'index' }
                }
            });
        }

        // --- 事件绑定 ---
        zetaSlider.addEventListener('input', updateChart);
        wnSlider.addEventListener('input', updateChart);

        // --- 启动 ---
        function init() {
            initChart();
            zetaSlider.value = '0.50';
            wnSlider.value = '1.00';
            updateChart();
        }

        init();
    })();
</script>
</body>
</html>
